<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reflections Legal</title>
  <style>
    :root {
      --bg: #fef9e7;
      --surface: #f9f4e2;
      --text: #1d1c11;
      --muted: #48473c;
      --accent: #2b2d07;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 24px;
      margin-top: 24px;
    }
    h1, h2 { color: var(--accent); }
    a { color: var(--accent); }
    p, li { line-height: 1.6; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Reflections</h1>
    <p>Legal and support pages for the Reflections iOS app.</p>

    <div class="card">
      <h2>Pages</h2>
      <ul>
        <li><a href="./privacy.html">Privacy Policy</a></li>
        <li><a href="./terms.html">Terms of Use</a></li>
        <li><a href="./support.html">Support</a></li>
      </ul>
    </div>
  </main>
</body>
</html>
